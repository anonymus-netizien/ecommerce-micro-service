spring:
  application:
    name: PRODUCT-SERVICE
  mongodb:
    uri: mongodb://localhost:27017/products_db

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: jwt-secret-code

server:
  port: 8091